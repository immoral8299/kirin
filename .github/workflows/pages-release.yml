name: Build DMG and Publish Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    env:
      SWIFT_VERSION: "6.3"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Swift toolchain
        id: swift-toolchain-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.swiftly
            ~/Library/Developer/Toolchains/swift-${{ env.SWIFT_VERSION }}*.xctoolchain
          key: swift-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFT_VERSION }}

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Save Swift toolchain
        if: steps.swift-toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.swiftly
            ~/Library/Developer/Toolchains/swift-${{ env.SWIFT_VERSION }}*.xctoolchain
          key: ${{ steps.swift-toolchain-cache.outputs.cache-primary-key }}

      - name: Install release dependencies
        run: brew list vips >/dev/null 2>&1 || brew install vips

      - name: Restore Swift build products
        id: swift-build-cache
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: swift-build-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFT_VERSION }}-${{ github.sha }}
          restore-keys: |
            swift-build-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFT_VERSION }}-

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
            tag="${GITHUB_REF_NAME}"
          else
            version="0.1.${GITHUB_RUN_NUMBER}"
            tag="v${version}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: scripts/release-dmg.sh

      - name: Save Swift build products
        if: steps.swift-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.swift-build-cache.outputs.cache-primary-key }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare GitHub Pages site
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
          PAGE_URL: https://immoral8299.github.io/kirin/
          DOWNLOAD_URL: https://immoral8299.github.io/kirin/downloads/Kirin.dmg
        run: |
          release_date="$(date -u +%F)"
          mkdir -p public/downloads
          cp dist/Kirin.dmg public/downloads/Kirin.dmg
          cat > public/release.json <<JSON
          {
            "appName": "Kirin",
            "version": "${VERSION}",
            "tag": "${TAG}",
            "releaseDate": "${release_date}",
            "downloadURL": "${DOWNLOAD_URL}",
            "pageURL": "${PAGE_URL}"
          }
          JSON
          cat > public/index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Kirin Downloads</title>
            <style>
              :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
              body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: Canvas; color: CanvasText; }
              main { width: min(90vw, 560px); padding: 32px; }
              h1 { margin: 0 0 8px; font-size: 32px; }
              p { color: color-mix(in srgb, CanvasText 72%, transparent); line-height: 1.5; }
              a.button { display: inline-block; margin-top: 16px; padding: 12px 18px; border-radius: 10px; background: #6c63a6; color: white; text-decoration: none; font-weight: 700; }
              .meta { margin-top: 18px; font-size: 13px; }
              .release { margin: 12px 0 0; font-size: 14px; font-weight: 700; color: CanvasText; }
            </style>
          </head>
          <body>
            <main>
              <h1>Kirin</h1>
              <p>Download the latest macOS DMG build.</p>
              <p class="release">${TAG} &middot; Released ${release_date}</p>
              <a class="button" href="./downloads/Kirin.dmg">Download Kirin</a>
              <p class="meta">To bypass gatekeeper, run</p>
              <pre class="meta">
                <code>sudo xattr -r -d com.apple.quarantine /Applications/Kirin.app</code>
              </pre>
            </main>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
