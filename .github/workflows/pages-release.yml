name: Build DMG and Publish Pages

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-26
    env:
      SWIFT_VERSION: "6.3"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Restore Swift toolchain
        id: swift-toolchain-cache
        uses: actions/cache/restore@v4
        with:
          path: /Library/Developer/Toolchains/swift-${{ env.SWIFT_VERSION }}*.xctoolchain
          key: swift-toolchain-${{ runner.os }}-${{ runner.arch }}-${{ env.SWIFT_VERSION }}

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: ${{ env.SWIFT_VERSION }}

      - name: Save Swift toolchain
        if: steps.swift-toolchain-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /Library/Developer/Toolchains/swift-${{ env.SWIFT_VERSION }}*.xctoolchain
          key: ${{ steps.swift-toolchain-cache.outputs.cache-primary-key }}

      - name: Resolve Homebrew cache path
        id: homebrew-cache
        shell: bash
        run: echo "path=$(brew --cache)" >> "${GITHUB_OUTPUT}"

      - name: Restore Homebrew vips bottles
        id: homebrew-vips-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.homebrew-cache.outputs.path }}
          key: homebrew-vips-${{ runner.os }}-${{ runner.arch }}-v1

      - name: Install release dependencies
        run: brew install vips

      - name: Save Homebrew vips bottles
        if: steps.homebrew-vips-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ steps.homebrew-cache.outputs.path }}
          key: ${{ steps.homebrew-vips-cache.outputs.cache-primary-key }}

      - name: Restore Swift build products
        id: swift-build-cache
        uses: actions/cache/restore@v4
        with:
          path: .build
          key: swift-build-${{ runner.arch }}-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift', 'Tests/**/*.swift') }}
          restore-keys: |
            swift-build-${{ runner.arch }}-

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.1.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Build DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: scripts/release-dmg.sh

      - name: Save Swift build products
        if: steps.swift-build-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .build
          key: ${{ steps.swift-build-cache.outputs.cache-primary-key }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare GitHub Pages site
        shell: bash
        run: |
          mkdir -p public/downloads
          cp dist/Kirin.dmg public/downloads/Kirin.dmg
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Kirin Downloads</title>
            <style>
              :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
              body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: Canvas; color: CanvasText; }
              main { width: min(90vw, 560px); padding: 32px; }
              h1 { margin: 0 0 8px; font-size: 32px; }
              p { color: color-mix(in srgb, CanvasText 72%, transparent); line-height: 1.5; }
              a.button { display: inline-block; margin-top: 16px; padding: 12px 18px; border-radius: 10px; background: #6c63a6; color: white; text-decoration: none; font-weight: 700; }
              .meta { margin-top: 18px; font-size: 13px; }
            </style>
          </head>
          <body>
            <main>
              <h1>Kirin</h1>
              <p>Download the latest macOS DMG build.</p>
              <a class="button" href="./downloads/Kirin.dmg">Download Kirin.dmg</a>
              <p class="meta">Published from GitHub Actions.</p>
            </main>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
